version: 2.1

jobs:
  test-applescript:
    machine: true
    resource_class: gnome/gimp
    steps:
      - run:
          name: Test AppleScript Finder access
          command: |
            echo "Testing if this runner process can control Finder via AppleScript..."
            echo "If a permission dialog appears on the MacStadium desktop, click Allow."
            osascript -e 'tell application "Finder" to get name of every disk'
            echo "SUCCESS: AppleScript can control Finder."

workflows:
  test-applescript:
    jobs:
      - test-applescript
